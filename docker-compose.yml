version: '3.8'

services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://certiflow:certiflow@postgres:5432/certiflow
      POSTGRES_DB: certiflow
      POSTGRES_USER: certiflow
      POSTGRES_PASSWORD: certiflow
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production-min-32-chars}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production-min-32-chars}
      TAMPER_SECRET_KEY: ${TAMPER_SECRET_KEY:-your-tamper-secret-key-change-in-production-min-32-chars}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - ./app/storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: certiflow
      POSTGRES_USER: certiflow
      POSTGRES_PASSWORD: certiflow
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certiflow -d certiflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./app/storage:/usr/share/nginx/html/storage
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  ssl: